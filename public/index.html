<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrabCrush - AI 助手</title>
  <!-- 本地 vendor 优先，避免 CDN 超时；无 token 时也可加载 -->
  <link rel="stylesheet" href="/vendor/github-dark.min.css" onerror="this.onerror=null;this.href='https://unpkg.npmmirror.com/highlight.js@11.11.1/styles/github-dark.min.css'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --primary: #e94560;
      --primary-dim: #c13550;
      --text: #e8e8e8;
      --text-muted: #777;
      --user-bg: #0f3460;
      --bot-bg: #1e1e36;
      --border: #2a2a40;
      --code-bg: #161b22;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Microsoft YaHei', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 0.7rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-shrink: 0;
      position: relative;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .subtitle { font-size: 0.72rem; color: var(--text-muted); }
    #sessions-btn {
      position: absolute;
      left: 1rem;
      padding: 0.35rem 0.7rem;
      font-size: 0.85rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
    }
    #sessions-btn:hover { color: var(--text); border-color: var(--text-muted); }
    /* 会话侧边栏 */
    #sessions-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    #sessions-sidebar.open { transform: translateX(0); }
    #sessions-sidebar-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #sessions-sidebar-header h3 { font-size: 0.95rem; }
    #sessions-new { font-size: 0.8rem; padding: 0.25rem 0.5rem; background: var(--border); border: none; border-radius: 4px; color: var(--text); cursor: pointer; }
    #sessions-new:hover { background: var(--text-muted); color: white; }
    #sessions-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }
    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .session-item {
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item:hover { background: var(--border); }
    .session-item.active { background: var(--user-bg); color: white; }
    .session-item .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    #sessions-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #sessions-overlay.visible { opacity: 1; pointer-events: auto; }

    /* Status bar */
    #status {
      text-align: center;
      padding: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface);
      flex-shrink: 0;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #f87171; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Message bubbles */
    .message {
      max-width: 85%;
      margin-bottom: 0.75rem;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      line-height: 1.7;
      word-break: break-word;
      font-size: 0.95rem;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }
    .message.user {
      background: var(--user-bg);
      margin-left: auto;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .message.assistant {
      background: var(--bot-bg);
      border-bottom-left-radius: 4px;
    }
    .message.error {
      background: #2d1b1b;
      color: #f87171;
      border: 1px solid #4a2020;
      white-space: pre-wrap;
    }

    .messages-load-more {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: center;
      padding: 0.6rem;
      margin-bottom: 0.5rem;
      background: var(--bg);
    }
    .messages-load-more button {
      font-size: 0.85rem;
      padding: 0.3rem 0.8rem;
      background: var(--border);
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .messages-load-more button:hover:not(:disabled) { background: var(--text-muted); color: white; }
    .messages-load-more button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Streaming cursor */
    .streaming-cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--primary);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Markdown content inside bot messages */
    .message.assistant p { margin: 0.4em 0; }
    .message.assistant p:first-child { margin-top: 0; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant ul, .message.assistant ol {
      margin: 0.4em 0;
      padding-left: 1.5em;
    }
    .message.assistant li { margin: 0.15em 0; }
    .message.assistant blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 0.8em;
      margin: 0.5em 0;
      color: var(--text-muted);
    }
    .message.assistant h1, .message.assistant h2,
    .message.assistant h3, .message.assistant h4 {
      margin: 0.6em 0 0.3em;
      line-height: 1.3;
    }
    .message.assistant h1 { font-size: 1.3em; }
    .message.assistant h2 { font-size: 1.15em; }
    .message.assistant h3 { font-size: 1.05em; }
    .message.assistant hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.8em 0;
    }
    .message.assistant a {
      color: #60a5fa;
      text-decoration: none;
    }
    .message.assistant a:hover { text-decoration: underline; }
    .message.assistant strong { color: #fff; }
    .message.assistant table {
      border-collapse: collapse;
      margin: 0.5em 0;
      font-size: 0.9em;
    }
    .message.assistant th, .message.assistant td {
      border: 1px solid var(--border);
      padding: 0.35em 0.7em;
    }
    .message.assistant th {
      background: var(--surface);
      font-weight: 600;
    }

    /* Inline code */
    .message.assistant code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    }

    /* Code blocks */
    .message.assistant pre {
      background: var(--code-bg);
      border-radius: 8px;
      margin: 0.5em 0;
      overflow-x: auto;
      position: relative;
    }
    .message.assistant pre code {
      display: block;
      padding: 0.8em 1em;
      background: transparent;
      font-size: 0.85em;
      line-height: 1.5;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3em 0.8em;
      background: #1c2333;
      border-radius: 8px 8px 0 0;
      font-size: 0.75em;
      color: var(--text-muted);
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.15em 0.5em;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    /* Token usage */
    .usage {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 0.2rem;
      margin-bottom: 0.5rem;
    }

        /* Tool call display */
    .tool-plan, .tool-call {
      margin: 0.5rem 1rem;
      padding: 0.6rem 0.8rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .tool-plan {
      background: rgba(16, 185, 129, 0.08);
      border-left: 3px solid #10b981;
    }
    .tool-call {
      background: rgba(99, 102, 241, 0.1);
      border-left: 3px solid #6366f1;
    }
    .tool-header { color: var(--text); margin-bottom: 0.3rem; }
    .tool-header strong { color: #818cf8; }
    .tool-plan .tool-header strong { color: #34d399; }
    .tool-args { margin-bottom: 0.2rem; }
    .tool-args code { background: rgba(255,255,255,0.06); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }
    .tool-result { color: #a5b4fc; }

    /* Welcome screen */
    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .welcome .emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .welcome h2 { color: var(--text); margin-bottom: 0.5rem; font-size: 1.2rem; }
    .welcome p { font-size: 0.9rem; line-height: 1.6; }

    /* Input area */
    #input-area {
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 150px;
      transition: border-color 0.2s;
    }
    #input:focus { border-color: var(--primary); }
    #input::placeholder { color: var(--text-muted); }
    #input:disabled { opacity: 0.5; }
    .action-btn {
      padding: 0.65rem 1.2rem;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    #send {
      background: var(--primary);
    }
    #send:hover { background: var(--primary-dim); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #stop-btn {
      background: #dc2626;
      min-width: 4rem;
    }
    #stop-btn:hover:not(.inactive) { background: #b91c1c; }
    #stop-btn.inactive { opacity: 0.4; cursor: default; }
    #input-area.streaming #stop-btn:not(.inactive) {
      animation: stop-pulse 1.5s ease-in-out infinite;
    }
    @keyframes stop-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); } 50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); } }

    /* Confirm modal */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-modal {
      width: min(520px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .confirm-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .confirm-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .confirm-args {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.8rem;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
      white-space: pre-wrap;
      max-height: 180px;
      overflow: auto;
    }
    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    .confirm-actions .action-btn {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .message { max-width: 92%; font-size: 0.9rem; }
      #input-area { padding: 0.5rem; }
    }
  </style>
</head>
<body>
  <div id="sessions-overlay"></div>
  <div id="sessions-sidebar">
    <div id="sessions-sidebar-header">
      <h3>会话列表</h3>
      <div style="display:flex;gap:0.3rem;align-items:center">
        <button id="sessions-new" type="button" title="新建会话">新建</button>
        <button id="sessions-close" type="button" title="关闭">×</button>
      </div>
    </div>
    <div id="sessions-list"></div>
    <div id="sessions-more" style="padding:0.5rem;text-align:center;display:none">
      <button id="sessions-load-more" type="button" style="font-size:0.85rem;padding:0.3rem 0.6rem;background:var(--border);border:none;border-radius:4px;color:var(--text-muted);cursor:pointer">加载更多</button>
    </div>
  </div>
  <header>
    <button id="sessions-btn" type="button" title="会话列表">会话</button>
    <span style="font-size:1.3rem">🦀</span>
    <div>
      <h1>CrabCrush</h1>
      <div class="subtitle">你的私人 AI 助手</div>
    </div>
  </header>
  <div id="status">连接中...</div>
  <div id="messages">
    <div class="welcome">
      <div class="emoji">🦀</div>
      <h2>你好！我是 CrabCrush</h2>
      <p>做你的虾兵蟹将 —— 随时为你服务<br>输入消息开始对话吧</p>
    </div>
  </div>
  <details id="audit-details" style="margin:0 1rem 0.75rem;padding:0.75rem 0.9rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px">
    <summary style="cursor:pointer;font-size:0.9rem;color:var(--text-muted)">审计回放</summary>
    <div id="audit-timeline" style="margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted)">当前会话暂无可回放的执行审计。</div>
  </details>
  <details id="grants-details" style="margin:0 1rem 0.75rem;padding:0.75rem 0.9rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px">
    <summary style="cursor:pointer;font-size:0.9rem;color:var(--text-muted)">持久授权记录</summary>
    <div id="grants-panel" style="margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted)">当前暂无持久授权记录。</div>
  </details>
  <div id="input-area" class="">
    <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行, Esc 停止)" rows="1"></textarea>
    <button id="send" class="action-btn" disabled>发送</button>
    <button id="stop-btn" class="action-btn inactive" title="生成时可点击立即停止">停止</button>
  </div>

  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-modal">
      <div class="confirm-title" id="confirm-title">需要确认</div>
      <div class="confirm-desc" id="confirm-desc">该操作可能会修改本地数据，请确认是否继续。</div>
      <div id="confirm-preview" style="display:none;margin-bottom:0.6rem;padding:0.6rem 0.7rem;background:rgba(233,69,96,0.08);border:1px solid var(--border);border-radius:8px">
        <div id="confirm-preview-title" style="font-size:0.9rem;font-weight:600;margin-bottom:0.35rem"></div>
        <div id="confirm-preview-summary" style="font-size:0.82rem;color:var(--text-muted);line-height:1.6"></div>
        <div id="confirm-preview-risk" style="font-size:0.78rem;margin-top:0.35rem"></div>
        <div id="confirm-preview-targets" style="font-size:0.8rem;margin-top:0.45rem;white-space:pre-wrap"></div>
      </div>
      <div class="confirm-args" id="confirm-args"></div>
      <div id="confirm-scope" style="display:none;margin-top:0.8rem">
        <div id="confirm-scope-label" style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.45rem">授权范围</div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <button id="confirm-allow-once" class="action-btn" style="background:var(--primary)">仅本次允许</button>
          <button id="confirm-allow-session" class="action-btn" style="background:#2563eb">本会话允许</button>
          <button id="confirm-allow-persistent" class="action-btn" style="background:#0f766e">永久允许</button>
        </div>
      </div>
      <div class="confirm-actions">
        <button id="confirm-deny" class="action-btn" style="background:#3f3f46">拒绝</button>
      </div>
    </div>
  </div>

  <!-- 本地 /vendor 优先（不依赖外网 CDN）；失败时回退到国内 npmmirror -->
  <script src="/vendor/markdown-it.min.js"></script>
  <script src="/vendor/highlight.min.js" onerror="this.onerror=null;(function(){var s=document.createElement('script');s.src='https://unpkg.npmmirror.com/highlight.js@11.11.1/build/highlight.min.js';document.body.appendChild(s);})();"></script>
  <script>
    // ── Markdown 渲染器（无 markdownit 时页面会报错，需保证 /vendor/markdown-it.min.js 存在）──
    if (typeof window.markdownit !== 'function') {
      console.error('markdown-it 未加载，请运行: node scripts/copy-vendor.js');
      throw new Error('markdown-it 未加载');
    }
    const md = window.markdownit({
      html: false,
      linkify: true,
      typographer: true,
      highlight(str, lang) {
        if (typeof hljs !== 'undefined' && hljs.highlight) {
          if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(str, { language: lang }).value; } catch {}
          }
          try { return hljs.highlightAuto(str).value; } catch {}
        }
        return md.utils.escapeHtml(str);
      },
    });

    // 自定义 fence 渲染：添加语言标签和复制按钮
    const defaultFence = md.renderer.rules.fence;
    md.renderer.rules.fence = function(tokens, idx, options, env, self) {
      const token = tokens[idx];
      const lang = token.info.trim() || 'text';
      const code = token.content;
      const highlighted = options.highlight(code, lang) || md.utils.escapeHtml(code);
      return `<div class="code-header"><span>${lang}</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
    };

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    const TOOL_PREFIX = '__TOOL_CALL__\n';
    const TOOL_PLAN_PREFIX = '__TOOL_PLAN__\n';
    const TOOL_PLAN_RESULT_PREFIX = '__TOOL_PLAN_RESULT__\n';
    function renderMessagesToFragment(messages) {
      const fragment = document.createDocumentFragment();
      for (const m of messages) {
        try {
          if (m.role === 'user' || m.role === 'error') {
            const el = document.createElement('div');
            el.className = `message ${m.role}`;
            el.textContent = m.content || '';
            fragment.appendChild(el);
                    } else if (m.role === 'assistant' && m.content) {
            if (m.content.startsWith(TOOL_PREFIX) || m.content.startsWith(TOOL_PLAN_PREFIX) || m.content.startsWith(TOOL_PLAN_RESULT_PREFIX)) {
              let s = m.content;
              while (s.startsWith(TOOL_PREFIX) || s.startsWith(TOOL_PLAN_PREFIX) || s.startsWith(TOOL_PLAN_RESULT_PREFIX)) {
                const endIdx = s.indexOf('\n__END__');
                if (endIdx < 0) break;
                try {
                  if (s.startsWith(TOOL_PREFIX)) {
                    const t = JSON.parse(s.slice(TOOL_PREFIX.length, endIdx));
                    const toolEl = document.createElement('div');
                    toolEl.className = 'tool-call';
                    const icon = t.success ? '✅' : '❌';
                    const safeResult = escapeHtml(String(t.result || ''));
                    toolEl.innerHTML = `<div class="tool-header">${icon} 调用工具: <strong>${escapeHtml(t.name || '')}</strong></div><div class="tool-args">参数: <code>${escapeHtml(JSON.stringify(t.args || {}))}</code></div><div class="tool-result" style="white-space:pre-wrap">结果: ${safeResult}</div>`;
                    fragment.appendChild(toolEl);
                  } else if (s.startsWith(TOOL_PLAN_PREFIX)) {
                    const t = JSON.parse(s.slice(TOOL_PLAN_PREFIX.length, endIdx));
                    const planEl = document.createElement('div');
                    planEl.className = 'tool-plan';
                    const steps = Array.isArray(t.steps) ? t.steps : [];
                    const items = steps.map((step, idx) => {
                      const title = escapeHtml(step.preview?.title || step.name || '未命名步骤');
                      const summary = step.preview?.summary ? `<div style="margin-top:0.2rem;color:var(--text-muted)">${escapeHtml(step.preview.summary)}</div>` : '';
                      return `<div style="margin-top:0.45rem"><strong>${idx + 1}. ${title}</strong>${summary}</div>`;
                    }).join('');
                    planEl.innerHTML = `<div class="tool-header">📝 <strong>${escapeHtml(t.summary || '执行计划')}</strong></div>${items}`;
                    fragment.appendChild(planEl);
                  } else if (s.startsWith(TOOL_PLAN_RESULT_PREFIX)) {
                    const t = JSON.parse(s.slice(TOOL_PLAN_RESULT_PREFIX.length, endIdx));
                    const resultEl = document.createElement('div');
                    resultEl.className = 'tool-plan';
                    const icon = t.allowed ? '✅' : '❌';
                    const text = t.allowed ? '已批准执行计划' : '已拒绝执行计划';
                    resultEl.innerHTML = `<div class="tool-header">${icon} <strong>${text}</strong></div><div style="margin-top:0.25rem;color:var(--text-muted)">第 ${Number(t.round || 0)} 轮计划</div>`;
                    fragment.appendChild(resultEl);
                  }
                } catch (_) {}
                s = s.slice(endIdx + 8).replace(/^\s+/, '');
              }
            } else {
              const el = document.createElement('div');
              el.className = 'message assistant';
              el.innerHTML = md.render(m.content);
              fragment.appendChild(el);
            }
          }
        } catch (_err) {}
      }
      return fragment;
    }

    let loadingOlderHistory = false;
    function loadOlderHistory() {
      if (!sessionId || !ws || ws.readyState !== 1 || loadingOlderHistory || !hasMoreHistory) return;
      loadingOlderHistory = true;
      const btn = document.querySelector('#messages-load-more button');
      if (btn) { btn.disabled = true; btn.textContent = '加载中...'; }
      ws.send(JSON.stringify({ type: 'loadHistory', sessionId, limit: HISTORY_PAGE_SIZE, offset: historyOffset }));
    }

    let sessionsListOffset = 0;
    let historyOffset = 0;
    let hasMoreHistory = false;
    const HISTORY_PAGE_SIZE = 100;

    function openSessionsSidebar() {
      document.getElementById('sessions-sidebar').classList.add('open');
      document.getElementById('sessions-overlay').classList.add('visible');
      sessionsListOffset = 0;
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'listConversations', offset: 0 }));
    }

    function closeSessionsSidebar() {
      document.getElementById('sessions-sidebar').classList.remove('open');
      document.getElementById('sessions-overlay').classList.remove('visible');
    }

    function switchSession(id) {
      if (id === sessionId) { closeSessionsSidebar(); return; }
      sessionId = id;
      localStorage.setItem('crabcrush_session', sessionId);
      const url = new URL(location.href);
      url.searchParams.set('session', sessionId);
      history.replaceState(null, '', url.toString());
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'loadHistory', sessionId, limit: 100 }));
        requestAuditEvents();
        requestPermissionGrants();
      }
      closeSessionsSidebar();
    }

    function newSession() {
      sessionId = null;
      localStorage.removeItem('crabcrush_session');
      const url = new URL(location.href);
      url.searchParams.delete('session');
      history.replaceState(null, '', url.toString());
      messagesEl.innerHTML = '<div class="welcome"><div class="emoji">🦀</div><h2>你好！我是 CrabCrush</h2><p>做你的虾兵蟹将 —— 随时为你服务<br>输入消息开始对话吧</p></div>';
      if (auditTimeline) auditTimeline.innerHTML = '<div style="color:var(--text-muted)">当前会话暂无可回放的执行审计。</div>';
      if (auditDetails) auditDetails.open = false;
      if (grantsPanel) grantsPanel.innerHTML = '<div style="color:var(--text-muted)">当前暂无持久授权记录。</div>';
      if (grantsDetails) grantsDetails.open = false;
      welcomeShown = true;
      // 通知服务端重置 sessionId，否则下一条消息会发到旧会话
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'newSession' }));
        requestPermissionGrants();
      }
      closeSessionsSidebar();
    }

    // ── DOM 元素 ──
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const stopBtn = document.getElementById('stop-btn');
    const statusEl = document.getElementById('status');
    const confirmOverlay = document.getElementById('confirm-overlay');
    const confirmTitle = document.getElementById('confirm-title');
    const confirmDesc = document.getElementById('confirm-desc');
    const confirmArgs = document.getElementById('confirm-args');
    const confirmPreview = document.getElementById('confirm-preview');
    const confirmPreviewTitle = document.getElementById('confirm-preview-title');
    const confirmPreviewSummary = document.getElementById('confirm-preview-summary');
    const confirmPreviewRisk = document.getElementById('confirm-preview-risk');
    const confirmPreviewTargets = document.getElementById('confirm-preview-targets');
    const confirmScope = document.getElementById('confirm-scope');
    const confirmScopeLabel = document.getElementById('confirm-scope-label');
    const auditDetails = document.getElementById('audit-details');
    const auditTimeline = document.getElementById('audit-timeline');
    const grantsDetails = document.getElementById('grants-details');
    const grantsPanel = document.getElementById('grants-panel');
    const confirmAllowOnceBtn = document.getElementById('confirm-allow-once');
    const confirmAllowSessionBtn = document.getElementById('confirm-allow-session');
    const confirmAllowPersistentBtn = document.getElementById('confirm-allow-persistent');
    const confirmDenyBtn = document.getElementById('confirm-deny');

    let ws;
    let currentBotMsg = null;
    let rawContent = '';          // 当前 bot 消息的原始文本
    let isStreaming = false;
    // sessionId 优先从 URL 读取，避免多 Tab 时 localStorage 被其他 Tab 覆盖导致刷新后加载错误会话
    const urlParamsInit = new URLSearchParams(location.search);
    let sessionId = urlParamsInit.get('session') || localStorage.getItem('crabcrush_session') || null;
    let welcomeShown = true;
    let renderRAF = null;         // requestAnimationFrame ID，用于节流渲染

    const confirmQueue = [];
    let activeConfirm = null;

    function formatAuditTime(ts) {
      if (!ts) return '';
      try {
        return new Date(ts).toLocaleTimeString('zh-CN', { hour12: false });
      } catch (_) {
        return '';
      }
    }

    function summarizeAuditEvent(event) {
      const payload = event.payload || {};
      if (event.eventType === 'tool_plan') {
        const steps = Array.isArray(payload.steps) ? payload.steps.length : 0;
        return `计划审批：${steps} 个步骤待执行`;
      }
      if (event.eventType === 'tool_plan_result') return event.allowed ? '已批准执行计划' : '已拒绝执行计划';
      if (event.eventType === 'permission_request_result') {
        return `${event.allowed ? '已授权' : '已拒绝'}权限：${payload.action || event.eventType}`;
      }
      if (event.eventType === 'tool_confirm_request') return `等待确认：${payload.name || event.toolName || '未命名操作'}`;
      if (event.eventType === 'tool_confirm_result' || event.eventType === 'tool_confirm') {
        return `${event.allowed ? '已允许' : '已拒绝'}执行：${payload.name || event.toolName || '未命名操作'}`;
      }
      if (event.eventType === 'tool_call') return `开始执行工具：${payload.name || event.toolName || '未命名工具'}`;
      if (event.eventType === 'tool_result') {
        return `${payload.success ? '执行成功' : '执行失败'}：${payload.name || event.toolName || '未命名工具'}`;
      }
      return payload.name || payload.action || event.eventType;
    }

    function renderAuditEvents(events) {
      if (!auditTimeline) return;
      const replayable = Array.isArray(events) ? events.filter((event) => [
        'tool_plan',
        'tool_plan_result',
        'tool_confirm_request',
        'tool_confirm_result',
        'tool_confirm',
        'permission_request_result',
        'tool_call',
        'tool_result',
      ].includes(event.eventType)) : [];
      if (replayable.length === 0) {
        auditTimeline.innerHTML = '<div style="color:var(--text-muted)">当前会话暂无可回放的执行审计。</div>';
        return;
      }
      auditTimeline.innerHTML = replayable.map((event) => `
        <div style="padding:0.55rem 0;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="display:flex;justify-content:space-between;gap:0.6rem">
            <strong style="color:var(--text)">${escapeHtml(summarizeAuditEvent(event))}</strong>
            <span style="color:var(--text-muted)">${escapeHtml(formatAuditTime(event.createdAt))}</span>
          </div>
          ${event.scope ? `<div style="margin-top:0.2rem;color:var(--text-muted)">范围：${escapeHtml(String(event.scope))}</div>` : ''}
          ${event.grantKey ? `<div style="margin-top:0.2rem;color:var(--text-muted)">授权键：${escapeHtml(String(event.grantKey))}</div>` : ''}
        </div>
      `).join('');
    }

    function requestAuditEvents() {
      if (!sessionId || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'loadAuditEvents', sessionId, limit: 200 }));
    }

    function formatGrantTime(ts) {
      if (!ts) return '';
      try {
        return new Date(ts).toLocaleString('zh-CN', { hour12: false });
      } catch (_) {
        return '';
      }
    }

    function describeGrant(grant) {
      const typeMap = { path: '路径', domain: '域名', database: '数据库', other: '其他' };
      return {
        title: grant.resourceValue || grant.grantKey || '未命名资源',
        typeLabel: typeMap[grant.resourceType] || '其他',
        action: grant.meta?.action || '',
      };
    }

    function renderPermissionGrants(grants) {
      if (!grantsPanel) return;
      const list = Array.isArray(grants) ? grants : [];
      if (list.length === 0) {
        grantsPanel.innerHTML = '<div style="color:var(--text-muted)">当前暂无持久授权记录。</div>';
        return;
      }
      grantsPanel.innerHTML = list.map((grant) => {
        const info = describeGrant(grant);
        return `
          <div style="padding:0.65rem 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div style="display:flex;justify-content:space-between;gap:0.8rem;align-items:flex-start">
              <div>
                <div style="font-weight:600;color:var(--text)">${escapeHtml(String(info.title))}</div>
                <div style="margin-top:0.2rem;color:var(--text-muted)">类型：${escapeHtml(String(info.typeLabel))}${info.action ? ` | 操作：${escapeHtml(String(info.action))}` : ''}</div>
                <div style="margin-top:0.2rem;color:var(--text-muted)">授权键：${escapeHtml(String(grant.grantKey || ''))}</div>
                <div style="margin-top:0.2rem;color:var(--text-muted)">创建：${escapeHtml(formatGrantTime(grant.createdAt))}</div>
                <div style="margin-top:0.2rem;color:var(--text-muted)">最近使用：${escapeHtml(formatGrantTime(grant.lastUsedAt))}</div>
              </div>
              <button
                type="button"
                data-grant-key="${escapeHtml(String(grant.grantKey || ''))}"
                style="padding:0.35rem 0.55rem;border:none;border-radius:6px;background:#7f1d1d;color:#fff;cursor:pointer"
                onclick="revokeGrant(this)"
              >撤销</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function requestPermissionGrants() {
      if (!ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'loadPermissionGrants' }));
    }

    function revokeGrant(button) {
      const grantKey = button?.dataset?.grantKey;
      if (!grantKey || !ws || ws.readyState !== 1) return;
      button.disabled = true;
      button.textContent = '撤销中...';
      ws.send(JSON.stringify({ type: 'revokePermissionGrant', grantKey }));
    }
    window.revokeGrant = revokeGrant;

    function showNextConfirm() {
      if (activeConfirm || confirmQueue.length === 0) return;
      activeConfirm = confirmQueue.shift();
      if (!activeConfirm) return;
      if (confirmTitle) confirmTitle.textContent = `需要确认：${activeConfirm.name || ''}`;
      const defaultDesc = activeConfirm.kind === 'permission_request'
        ? '该操作需要额外权限，请确认是否继续。'
        : activeConfirm.kind === 'plan'
          ? '该计划批准后才会开始执行具体步骤。'
          : '该操作可能会修改本地数据，请确认是否继续。';
      if (confirmDesc) confirmDesc.textContent = activeConfirm.message || defaultDesc;
      if (confirmArgs) confirmArgs.textContent = JSON.stringify(activeConfirm.args || {}, null, 2);
      const preview = activeConfirm.preview;
      if (confirmPreview && preview) {
        confirmPreview.style.display = 'block';
        if (confirmPreviewTitle) confirmPreviewTitle.textContent = preview.title || '';
        if (confirmPreviewSummary) confirmPreviewSummary.textContent = preview.summary || '';
        if (confirmPreviewRisk) confirmPreviewRisk.textContent = preview.riskLevel ? `风险等级：${preview.riskLevel}` : '';
        if (confirmPreviewTargets) confirmPreviewTargets.textContent = Array.isArray(preview.targets) ? preview.targets.map(t => `- ${t}`).join('\n') : '';
      } else if (confirmPreview) {
        confirmPreview.style.display = 'none';
      }
      const scopeOptions = activeConfirm.scopeOptions || ['once'];
      const showScopeChoices = activeConfirm.kind !== 'plan' && scopeOptions.length > 1;
      if (confirmScope) confirmScope.style.display = scopeOptions.includes('once') || showScopeChoices ? 'block' : 'none';
      if (confirmScopeLabel) confirmScopeLabel.style.display = showScopeChoices ? 'block' : 'none';
      if (confirmAllowOnceBtn) {
        confirmAllowOnceBtn.style.display = scopeOptions.includes('once') ? 'inline-flex' : 'none';
        confirmAllowOnceBtn.textContent = activeConfirm.kind === 'plan' ? '批准执行' : showScopeChoices ? '仅本次允许' : '允许';
      }
      if (confirmAllowSessionBtn) confirmAllowSessionBtn.style.display = showScopeChoices && scopeOptions.includes('session') ? 'inline-flex' : 'none';
      if (confirmAllowPersistentBtn) confirmAllowPersistentBtn.style.display = showScopeChoices && scopeOptions.includes('persistent') ? 'inline-flex' : 'none';
      if (confirmOverlay) confirmOverlay.classList.add('visible');
    }

    function resolveConfirm(allow, scope = 'once') {
      if (!activeConfirm) return;
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({
          type: 'confirm_result',
          id: activeConfirm.id,
          allow: Boolean(allow),
          scope,
        }));
      }
      activeConfirm = null;
      if (confirmOverlay) confirmOverlay.classList.remove('visible');
      showNextConfirm();
    }

    // ── WebSocket 连接 ──
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      // 传递 URL 中的 token 参数到 WebSocket 连接
      const urlParams = new URLSearchParams(location.search);
      const token = urlParams.get('token');
      const wsUrl = token
        ? `${protocol}//${location.host}/ws?token=${encodeURIComponent(token)}`
        : `${protocol}//${location.host}/ws`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusEl.textContent = '已连接';
        statusEl.className = 'connected';
        if (!isStreaming) sendBtn.disabled = false;

        // 持久授权按 principal（webchat）展示，与 session 无关，连接后即拉取
        requestPermissionGrants();

        // 刷新/重连时优先从 URL 读取 sessionId，确保加载正确会话
        const urlParams = new URLSearchParams(location.search);
        const sessionFromUrl = urlParams.get('session');
        if (sessionFromUrl) sessionId = sessionFromUrl;
        if (sessionId) {
          ws.send(JSON.stringify({ type: 'loadHistory', sessionId, limit: 100 }));
          requestAuditEvents();
        }
      };

      ws.onclose = () => {
        statusEl.textContent = '连接断开，3秒后重连...';
        statusEl.className = 'error';
        if (isStreaming) finishStreaming(); // 连接断开时重置 UI
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusEl.textContent = '连接出错';
        statusEl.className = 'error';
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'session') {
          sessionId = msg.sessionId;
          localStorage.setItem('crabcrush_session', sessionId);
          // 写入 URL，刷新时优先从 URL 恢复，避免多 Tab 覆盖导致加载错误会话
          const url = new URL(location.href);
          url.searchParams.set('session', sessionId);
          history.replaceState(null, '', url.toString());

        } else if (msg.type === 'conversations') {
          const listEl = document.getElementById('sessions-list');
          const moreEl = document.getElementById('sessions-more');
          if (!listEl) return;
          const append = (msg.offset || 0) > 0;
          if (!append) listEl.innerHTML = '';
          if (msg.list && msg.list.length > 0) {
            for (const c of msg.list) {
              const el = document.createElement('div');
              el.className = 'session-item' + (c.id === sessionId ? ' active' : '');
              const title = (c.title || '（无标题）').slice(0, 40);
              el.innerHTML = `<div>${escapeHtml(title)}</div><div class="meta">${c.messageCount} 条消息</div>`;
              el.onclick = () => switchSession(c.id);
              listEl.appendChild(el);
            }
            sessionsListOffset = (msg.offset || 0) + msg.list.length;
          }
          if (!append && (!msg.list || msg.list.length === 0)) {
            listEl.innerHTML = '<div style="padding:1rem;color:var(--text-muted);font-size:0.9rem">暂无会话</div>';
          }
          if (moreEl) moreEl.style.display = (msg.list && msg.list.length >= 50) ? 'block' : 'none';
        } else if (msg.type === 'history') {
          if (msg.sessionId) {
            sessionId = msg.sessionId;
            localStorage.setItem('crabcrush_session', sessionId);
            const url = new URL(location.href);
            url.searchParams.set('session', sessionId);
            history.replaceState(null, '', url.toString());
          }
          requestAuditEvents();
          requestPermissionGrants();
          hasMoreHistory = Boolean(msg.hasMore);
          const append = (msg.offset || 0) > 0;
          const fragment = renderMessagesToFragment(msg.messages || []);
          if (!append) {
            messagesEl.innerHTML = '';
            welcomeShown = false;
            if (fragment.childNodes.length > 0) {
              messagesEl.appendChild(fragment);
              historyOffset = msg.messages.length;
            } else {
              messagesEl.innerHTML = '<div class="welcome"><div class="emoji">🦀</div><h2>暂无消息</h2><p>输入消息开始对话</p></div>';
              welcomeShown = true;
            }
            if (hasMoreHistory) {
              const moreBtn = document.createElement('div');
              moreBtn.id = 'messages-load-more';
              moreBtn.className = 'messages-load-more';
              moreBtn.innerHTML = '<button type="button">加载更早的消息</button>';
              moreBtn.onclick = loadOlderHistory;
              messagesEl.insertBefore(moreBtn, messagesEl.firstChild);
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else {
            const loadMoreEl = document.getElementById('messages-load-more');
            const insertBefore = loadMoreEl ? loadMoreEl.nextSibling : messagesEl.firstChild;
            const prevScrollHeight = messagesEl.scrollHeight;
            const prevScrollTop = messagesEl.scrollTop;
            messagesEl.insertBefore(fragment, insertBefore);
            historyOffset += msg.messages.length;
            loadingOlderHistory = false;
            if (!hasMoreHistory && loadMoreEl) loadMoreEl.remove();
            else {
              const btn = loadMoreEl?.querySelector('button');
              if (btn) { btn.disabled = false; btn.textContent = '加载更早的消息'; }
            }
            messagesEl.scrollTop = prevScrollTop + (messagesEl.scrollHeight - prevScrollHeight);
          }
        } else if (msg.type === 'audit_events') {
          renderAuditEvents(msg.events || []);
        } else if (msg.type === 'permission_grants') {
          renderPermissionGrants(msg.grants || []);
        } else if (msg.type === 'permission_grant_revoked') {
          if (!msg.revoked) addMessage('error', '撤销授权失败：未找到该授权记录。');
        } else if (msg.type === 'stream_control') {
          if (msg.action === 'clear_last') {
            if (currentBotMsg) {
              cancelAnimationFrame(renderRAF);
              const parent = currentBotMsg.parentNode;
              if (parent) parent.removeChild(currentBotMsg);
              currentBotMsg = null;
            }
            rawContent = '';
            const hint = document.createElement('div');
            hint.textContent = '已更新：检测到工具调用，已撤回先前输出。';
            hint.style.cssText = 'font-size:0.85em;color:#9ca3af;margin:0.25rem 0 0.5rem;';
            messagesEl.appendChild(hint);
          }
        } else if (msg.type === 'confirm') {
          confirmQueue.push({ id: msg.id, name: msg.name, args: msg.args, kind: msg.kind, message: msg.message, preview: msg.preview, scopeOptions: msg.scopeOptions, defaultScope: msg.defaultScope });
          showNextConfirm();

                } else if (msg.type === 'tool_plan') {
          const planEl = document.createElement('div');
          planEl.className = 'tool-plan';
          const steps = Array.isArray(msg.steps) ? msg.steps : [];
          const items = steps.map((step, idx) => {
            const title = escapeHtml(step.preview?.title || step.name || '未命名步骤');
            const summary = step.preview?.summary
              ? `<div style="margin-top:0.2rem;color:var(--text-muted)">${escapeHtml(step.preview.summary)}</div>`
              : '';
            return `<div style="margin-top:0.45rem"><strong>${idx + 1}. ${title}</strong>${summary}</div>`;
          }).join('');
          planEl.innerHTML = `<div class="tool-header">📝 <strong>${escapeHtml(msg.summary || '执行计划')}</strong></div>${items}`;
          messagesEl.appendChild(planEl);
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (msg.type === 'tool_call') {
          // 工具调用事件 — 在聊天区域显示调用过程
          const toolEl = document.createElement('div');
          toolEl.className = 'tool-call';
          const statusIcon = msg.success ? '✅' : '❌';
          toolEl.innerHTML = `
            <div class="tool-header">${statusIcon} 调用工具: <strong>${escapeHtml(msg.name || '')}</strong></div>
            <div class="tool-args">参数: <code>${escapeHtml(JSON.stringify(msg.args || {}))}</code></div>
            <div class="tool-result" style="white-space:pre-wrap">结果: ${escapeHtml(String(msg.result || ''))}</div>
          `;
          messagesEl.appendChild(toolEl);
          messagesEl.scrollTop = messagesEl.scrollHeight;

        } else if (msg.type === 'chunk') {
          if (!isStreaming) return; // 忽略 stop 后迟到的 chunk，避免产生孤立消息
          if (!currentBotMsg) {
            currentBotMsg = addMessage('assistant', '');
          }
          rawContent += msg.content;
          scheduleRender();

        } else if (msg.type === 'done') {
          if (!isStreaming) return; // 避免重复处理（stop 后可能收到多处 done）
          // 最终渲染（确保完整内容正确显示）
          if (currentBotMsg) {
            cancelAnimationFrame(renderRAF);
            renderMarkdown(currentBotMsg, rawContent);
          }
          if (msg.usage || msg.model || msg.cost) {
            showUsage(msg.usage, msg.model, msg.cost);
          }
          requestAuditEvents();
          requestPermissionGrants();
          finishStreaming();

        } else if (msg.type === 'error') {
          if (currentBotMsg) {
            cancelAnimationFrame(renderRAF);
            renderMarkdown(currentBotMsg, rawContent);
          }
          addMessage('error', `${msg.message}`);
          finishStreaming();
        }
      };
    }

    // ── 消息渲染 ──
    function addMessage(role, content) {
      if (welcomeShown) {
        const w = messagesEl.querySelector('.welcome');
        if (w) w.remove();
        welcomeShown = false;
      }
      const el = document.createElement('div');
      el.className = `message ${role}`;
      if (role === 'user' || role === 'error') {
        el.textContent = content;
      }
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    /** 节流渲染：每个 animation frame 最多渲染一次 */
    function scheduleRender() {
      if (renderRAF) return;
      renderRAF = requestAnimationFrame(() => {
        renderRAF = null;
        if (currentBotMsg) {
          renderMarkdown(currentBotMsg, rawContent, true);
          scrollToBottom();
        }
      });
    }

    /** 渲染 Markdown 到元素 */
    function renderMarkdown(el, text, showCursor) {
      el.innerHTML = md.render(text);
      if (showCursor) {
        const cursor = document.createElement('span');
        cursor.className = 'streaming-cursor';
        el.appendChild(cursor);
      }
    }

    function showUsage(usage, model, cost) {
      const parts = [];
      if (model) parts.push(model);
      if (usage) {
        const prompt = usage.promptTokens ?? '?';
        const completion = usage.completionTokens ?? '?';
        parts.push(`tokens: ${prompt} → ${completion}`);
      }
      if (cost) parts.push(cost);
      if (parts.length === 0) return;

      const el = document.createElement('div');
      el.className = 'usage';
      el.textContent = parts.join(' | ');
      messagesEl.appendChild(el);
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── 发送 / 停止 ──
    function send() {
      const content = inputEl.value.trim();
      if (!content || isStreaming || !ws || ws.readyState !== 1) return;

      addMessage('user', content);

      const payload = { type: 'chat', content };
      if (sessionId) payload.sessionId = sessionId;
      ws.send(JSON.stringify(payload));

      inputEl.value = '';
      inputEl.style.height = 'auto';
      startStreaming();
    }

    function stopGeneration() {
      if (!isStreaming || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'stop' }));
    }

    function startStreaming() {
      isStreaming = true;
      rawContent = '';
      currentBotMsg = null;
      sendBtn.disabled = true;
      stopBtn.classList.remove('inactive');
      inputEl.disabled = true;
      document.getElementById('input-area').classList.add('streaming');
    }

    function finishStreaming() {
      isStreaming = false;
      rawContent = '';
      currentBotMsg = null;
      activeConfirm = null;
      confirmQueue.length = 0;
      if (confirmOverlay) confirmOverlay.classList.remove('visible');
      sendBtn.disabled = false;
      stopBtn.classList.add('inactive');
      inputEl.disabled = false;
      inputEl.focus();
      document.getElementById('input-area').classList.remove('streaming');
    }

    // ── 复制代码 ──
    function copyCode(btn) {
      const pre = btn.closest('.code-header').nextElementSibling;
      const code = pre?.querySelector('code')?.textContent || '';
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
    window.copyCode = copyCode;

    // ── 事件绑定 ──
    sendBtn.addEventListener('click', send);
    stopBtn.addEventListener('click', stopGeneration);
    if (confirmAllowOnceBtn) confirmAllowOnceBtn.addEventListener('click', () => resolveConfirm(true, 'once'));
    if (confirmAllowSessionBtn) confirmAllowSessionBtn.addEventListener('click', () => resolveConfirm(true, 'session'));
    if (confirmAllowPersistentBtn) confirmAllowPersistentBtn.addEventListener('click', () => resolveConfirm(true, 'persistent'));
    if (confirmDenyBtn) confirmDenyBtn.addEventListener('click', () => resolveConfirm(false, 'once'));
    if (confirmOverlay) {
      confirmOverlay.addEventListener('click', (e) => {
        if (e.target === confirmOverlay) resolveConfirm(false);
      });
    }
    document.getElementById('sessions-btn').addEventListener('click', openSessionsSidebar);
    document.getElementById('sessions-close').addEventListener('click', closeSessionsSidebar);
    document.getElementById('sessions-new').addEventListener('click', newSession);
    document.getElementById('sessions-load-more').addEventListener('click', () => {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'listConversations', offset: sessionsListOffset }));
    });

    // 消息区滚动到顶时自动加载更早的消息
    messagesEl.addEventListener('scroll', () => {
      if (hasMoreHistory && !loadingOlderHistory && messagesEl.scrollTop < 80) {
        loadOlderHistory();
      }
    });
    document.getElementById('sessions-overlay').addEventListener('click', closeSessionsSidebar);

    // Esc 停止：全局监听，不依赖 input 焦点
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isStreaming) {
        e.preventDefault();
        stopGeneration();
      }
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    });

    connect();
  </script>
</body>
</html>
